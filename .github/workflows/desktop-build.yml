name: desktop-build

on:
  workflow_dispatch:

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: install linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install workspace dependencies
        run: vp install

      - name: check workspace
        run: vp check

      - name: check versions
        run: vp run check:versions

      - name: check module boundaries
        run: vp run check:modules

      - name: check IPC boundary
        run: vp run check:ipc-boundary

      - name: check silent error boundary
        run: vp run check:silent-errors

      - name: check source-size boundary
        run: vp run check:source-size

      - name: test workspace
        run: vp run test:all

  build:
    name: ${{ matrix.name }}
    needs: quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-22.04
            args: ""
          - name: windows-x64
            runner: windows-latest
            args: ""
          - name: macos-x64
            runner: macos-latest
            args: --target x86_64-apple-darwin
          - name: macos-arm64
            runner: macos-latest
            args: --target aarch64-apple-darwin
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.name, 'macos-') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: setup rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          cache-on-failure: true

      - name: install linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install workspace dependencies
        run: vp install

      - name: build workspace packages
        run: vp run "@capubridge/cdp-protocol#build"

      - name: bundle adb resources
        run: vp run desktop#bundle:adb

      - name: build tauri bundles
        id: tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: vp exec tauri
          args: ${{ matrix.args }}
          retryAttempts: 2
          includeUpdaterJson: false

      - name: parse artifact paths
        id: parse-artifacts
        shell: bash
        run: |
          echo '${{ steps.tauri.outputs.artifactPaths }}' | \
            python3 -c "import json,sys; print('\n'.join(json.load(sys.stdin)))" \
            > artifact_paths.txt
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          cat artifact_paths.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: capubridge-${{ matrix.name }}
          path: ${{ steps.parse-artifacts.outputs.paths }}
          if-no-files-found: error
