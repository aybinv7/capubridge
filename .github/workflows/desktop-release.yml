name: desktop-release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-22.04
            args: ""
          - name: windows-x64
            runner: windows-latest
            args: ""
          - name: macos-x64
            runner: macos-latest
            args: --target x86_64-apple-darwin
          - name: macos-arm64
            runner: macos-latest
            args: --target aarch64-apple-darwin
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.name, 'macos-') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: setup rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          cache-on-failure: true

      - name: install linux dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: build workspace packages
        run: pnpm --filter utils run build

      - name: bundle adb resources
        run: pnpm --filter desktop run bundle:adb

      - name: build and release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm exec tauri
          args: ${{ matrix.args }}
          retryAttempts: 2
          includeUpdaterJson: false
          tagName: ${{ github.ref_name }}
          releaseName: Capubridge ${{ github.ref_name }}
          releaseBody: ${{ github.event.head_commit.message }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
